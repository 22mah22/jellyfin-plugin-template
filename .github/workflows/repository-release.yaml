name: '📦 Build Repository Package'

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Plugin version (example: 1.0.1.0)'
        required: true
      target_abi:
        description: 'Jellyfin target ABI (example: 10.11.0.0)'
        required: true
        default: '10.11.0.0'

permissions:
  contents: write

jobs:
  package:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '9.0.x'

      - name: Publish plugin
        run: dotnet publish Jellyfin.Plugin.Template/Jellyfin.Plugin.Template.csproj -c Release -o artifacts/publish

      - name: Create plugin archive
        run: |
          mkdir -p artifacts/release
          cd artifacts/publish
          zip -r ../release/jellyfin-plugin-gif-generator.zip .

      - name: Calculate md5 checksum
        id: checksum
        run: |
          checksum=$(md5sum artifacts/release/jellyfin-plugin-gif-generator.zip | awk '{ print $1 }')
          echo "md5=$checksum" >> "$GITHUB_OUTPUT"

      - name: Update manifest.json
        env:
          VERSION: ${{ github.event.inputs.version }}
          TARGET_ABI: ${{ github.event.inputs.target_abi }}
        run: |
          source_url="https://github.com/${{ github.repository }}/releases/download/v${VERSION}/jellyfin-plugin-gif-generator.zip"
          scripts/update_manifest.py manifest.json "$VERSION" "$TARGET_ABI" "$source_url" "${{ steps.checksum.outputs.md5 }}"

      - name: Commit manifest update
        env:
          VERSION: ${{ github.event.inputs.version }}
        run: |
          git config user.name github-actions
          git config user.email github-actions@github.com
          git add manifest.json
          git commit -m "chore: update manifest for v${VERSION}" || echo "No manifest changes"
          git push

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ github.event.inputs.version }}
          name: v${{ github.event.inputs.version }}
          generate_release_notes: true
          files: artifacts/release/jellyfin-plugin-gif-generator.zip
