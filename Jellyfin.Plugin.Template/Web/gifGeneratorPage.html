<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <title>GIF Generator</title>
    <style>
        .gifGeneratorRow {
            display: flex;
            gap: 1em;
            flex-wrap: wrap;
        }

        .gifGeneratorRow .inputContainer {
            flex: 1 1 220px;
            min-width: 220px;
        }

        .gifResult img {
            margin-top: .5em;
            max-width: min(100%, 420px);
            border-radius: 6px;
        }
    </style>
</head>
<body>
    <div id="GifGeneratorPage" data-role="page" class="page type-interior" data-require="emby-input,emby-button,emby-select">
        <div data-role="content">
            <div class="content-primary">
                <h2>Create GIF</h2>
                <div class="fieldDescription">Generate a GIF from a video item.</div>
                <div id="GifSignInMessage" class="fieldDescription" style="display:none; margin: .75em 0; color: var(--theme-danger, #ff6666);"></div>

                <form id="GifGeneratorForm">
                    <div class="inputContainer">
                        <label class="inputLabel inputLabelUnfocused" for="itemId">Item ID</label>
                        <input id="itemId" name="itemId" type="text" is="emby-input" required />
                    </div>
                    <div class="gifGeneratorRow">
                        <div class="inputContainer">
                            <label class="inputLabel inputLabelUnfocused" for="SubtitleStreamIndex">Subtitle Stream</label>
                            <select id="SubtitleStreamIndex" name="SubtitleStreamIndex" is="emby-select" disabled>
                                <option value="">No subtitles</option>
                            </select>
                            <div id="SubtitleStatus" class="fieldDescription">Enter an item id to load subtitle streams.</div>
                        </div>
                        <div class="inputContainer" style="align-self: flex-end;">
                            <button id="LoadSubtitlesBtn" is="emby-button" type="button" class="button-link emby-button">
                                <span>Load subtitles</span>
                            </button>
                        </div>
                    </div>
                    <div class="gifGeneratorRow">
                        <div class="inputContainer">
                            <label class="inputLabel inputLabelUnfocused" for="StartTimecode">Start Time</label>
                            <input id="StartTimecode" name="StartTimecode" type="text" is="emby-input" value="00:00" placeholder="hh:mm:ss or mm:ss" required pattern="^\d+:\d{2}(?::\d{2}(?:\.\d+)?)?$|^\d+:\d+(?:\.\d+)?$" />
                            <div class="fieldDescription">Examples: <code>00:42</code>, <code>01:03:20.5</code>.</div>
                        </div>
                        <div class="inputContainer">
                            <label class="inputLabel inputLabelUnfocused" for="lengthSeconds">Length Seconds</label>
                            <input id="lengthSeconds" name="lengthSeconds" type="number" min="0.1" step="0.01" value="3" is="emby-input" required />
                        </div>
                    </div>
                    <div class="gifGeneratorRow">
                        <div class="inputContainer">
                            <label class="inputLabel inputLabelUnfocused" for="width">Width (optional)</label>
                            <input id="width" name="width" type="number" min="0" step="1" value="0" is="emby-input" />
                        </div>
                        <div class="inputContainer">
                            <label class="inputLabel inputLabelUnfocused" for="fps">FPS (optional)</label>
                            <input id="fps" name="fps" type="number" min="0" step="1" value="0" is="emby-input" />
                        </div>
                    </div>
                    <div class="gifGeneratorRow">
                        <div class="inputContainer">
                            <label class="inputLabel inputLabelUnfocused" for="SubtitleFontSize">Subtitle Size (optional)</label>
                            <input id="SubtitleFontSize" name="SubtitleFontSize" type="number" is="emby-input" min="0" max="256" placeholder="0 = default" value="0" />
                        </div>
                        <div class="inputContainer">
                            <label class="inputLabel inputLabelUnfocused" for="SubtitleTimingOffset">Subtitle Timing Offset (optional)</label>
                            <input id="SubtitleTimingOffset" name="SubtitleTimingOffset" type="text" is="emby-input" placeholder="+500ms, -1.2s, +00:01.250" />
                        </div>
                    </div>
                    <button is="emby-button" type="submit" class="raised button-submit emby-button">
                        <span>Create GIF</span>
                    </button>
                </form>

                <div id="GifStatus" class="fieldDescription" style="margin-top: 1em;"></div>
                <div id="GifDownload" style="margin-top: .75em;"></div>
            </div>
        </div>

        <script type="text/javascript">
            (function () {
                'use strict';

                var form = document.querySelector('#GifGeneratorForm');
                var statusRegion = document.querySelector('#GifStatus');
                var downloadRegion = document.querySelector('#GifDownload');
                var signInRegion = document.querySelector('#GifSignInMessage');
                var subtitleStatusRegion = document.querySelector('#SubtitleStatus');

                function getBaseUrl() {
                    if (!window.ApiClient) {
                        return window.location.origin;
                    }

                    var serverAddress = window.ApiClient._serverAddress ||
                        (typeof window.ApiClient.serverAddress === 'function' ? window.ApiClient.serverAddress() : '');

                    return (serverAddress || window.location.origin).replace(/\/+$/, '');
                }

                function getAccessToken() {
                    if (!window.ApiClient) {
                        return '';
                    }

                    if (typeof window.ApiClient.accessToken === 'function') {
                        return window.ApiClient.accessToken() || '';
                    }

                    if (window.ApiClient._serverInfo && window.ApiClient._serverInfo.AccessToken) {
                        return window.ApiClient._serverInfo.AccessToken;
                    }

                    return '';
                }

                function getCurrentUserId() {
                    if (!window.ApiClient) {
                        return '';
                    }

                    if (typeof window.ApiClient.getCurrentUserId === 'function') {
                        return window.ApiClient.getCurrentUserId() || '';
                    }

                    if (window.ApiClient._serverInfo && window.ApiClient._serverInfo.UserId) {
                        return window.ApiClient._serverInfo.UserId;
                    }

                    return '';
                }

                function renderUnauthorized(message) {
                    signInRegion.style.display = 'block';
                    signInRegion.textContent = message || 'You must be signed in to create GIFs.';
                    statusRegion.textContent = 'Unauthorized (401/403). Redirecting to sign in...';
                    form.querySelector('button[type="submit"]').disabled = true;

                    var returnUrl = encodeURIComponent('#!/configurationpage?name=gifGeneratorPage');
                    var loginHash = '#!/login.html?returnurl=' + returnUrl;
                    setTimeout(function () {
                        if (window.Dashboard && typeof window.Dashboard.navigate === 'function') {
                            window.Dashboard.navigate(loginHash);
                        } else {
                            window.location.href = getBaseUrl() + '/web/index.html' + loginHash;
                        }
                    }, 1200);
                }

                function setStatus(text, isError) {
                    statusRegion.style.color = isError ? 'var(--theme-danger, #ff6666)' : '';
                    statusRegion.textContent = text;
                }

                function readOptionValue(option, camelKey, pascalKey) {
                    if (option && option[camelKey] !== undefined && option[camelKey] !== null) {
                        return option[camelKey];
                    }

                    if (option && option[pascalKey] !== undefined && option[pascalKey] !== null) {
                        return option[pascalKey];
                    }

                    return null;
                }

                function parsePositiveInt(selector) {
                    var value = parseInt(document.querySelector(selector).value, 10);
                    return Number.isNaN(value) ? 0 : value;
                }

                function parseTimecodeToSeconds(selector) {
                    var rawValue = document.querySelector(selector).value.trim();
                    if (!rawValue) {
                        throw new Error('Start time is required.');
                    }

                    var parts = rawValue.split(':');
                    if (parts.length < 2 || parts.length > 3) {
                        throw new Error('Start time must use mm:ss or hh:mm:ss format.');
                    }

                    var secondsText = parts[parts.length - 1];
                    var minutesText = parts[parts.length - 2];
                    var hoursText = parts.length === 3 ? parts[0] : '0';
                    var integerPattern = /^\d+$/;
                    var decimalPattern = /^\d+(?:\.\d+)?$/;

                    if (!integerPattern.test(minutesText) || !integerPattern.test(hoursText) || !decimalPattern.test(secondsText)) {
                        throw new Error('Start time can only contain non-negative numbers.');
                    }

                    var secondsPart = Number(secondsText);
                    var minutesPart = Number(minutesText);
                    var hoursPart = Number(hoursText);

                    if (secondsPart >= 60 || minutesPart >= 60) {
                        throw new Error('Start time minutes and seconds must be less than 60.');
                    }

                    return (hoursPart * 3600) + (minutesPart * 60) + secondsPart;
                }

                function clearDownload() {
                    downloadRegion.innerHTML = '';
                }

                function tryPrefillItemIdFromHash() {
                    var hash = window.location.hash || '';
                    var qIndex = hash.indexOf('?');
                    if (qIndex === -1) {
                        return;
                    }

                    var params = new URLSearchParams(hash.slice(qIndex + 1));
                    var hashItemId = params.get('itemId') || params.get('id');
                    if (!hashItemId) {
                        return;
                    }

                    document.querySelector('#itemId').value = hashItemId;
                }

                function subtitleLabel(option) {
                    var streamIndex = readOptionValue(option, 'streamIndex', 'StreamIndex');
                    var language = readOptionValue(option, 'language', 'Language');
                    var displayTitle = readOptionValue(option, 'displayTitle', 'DisplayTitle');
                    var isDefault = readOptionValue(option, 'isDefault', 'IsDefault');
                    var isForced = readOptionValue(option, 'isForced', 'IsForced');
                    var isExternal = readOptionValue(option, 'isExternal', 'IsExternal');
                    var isTextBased = readOptionValue(option, 'isTextBased', 'IsTextBased');
                    var parts = [];
                    if (language) {
                        parts.push(language);
                    }
                    if (displayTitle) {
                        parts.push(displayTitle);
                    }
                    if (isExternal) {
                        parts.push('External');
                    }
                    if (isDefault) {
                        parts.push('Default');
                    }
                    if (isForced) {
                        parts.push('Forced');
                    }
                    if (isTextBased === false) {
                        parts.push('Unsupported (image-based)');
                    }
                    return parts.length ? parts.join(' - ') : ('Subtitle stream ' + streamIndex);
                }

                function resetSubtitleSelect(message) {
                    var subtitleSelect = document.querySelector('#SubtitleStreamIndex');
                    subtitleSelect.innerHTML = '<option value="">No subtitles</option>';
                    subtitleSelect.disabled = true;
                    subtitleStatusRegion.textContent = message;
                }

                function populateSubtitleOptions(subtitles) {
                    var subtitleSelect = document.querySelector('#SubtitleStreamIndex');
                    subtitleSelect.innerHTML = '<option value="">No subtitles</option>';
                    var supportedCount = 0;

                    subtitles.forEach(function (option) {
                        var streamIndex = readOptionValue(option, 'streamIndex', 'StreamIndex');
                        var isTextBased = readOptionValue(option, 'isTextBased', 'IsTextBased');
                        var streamOption = document.createElement('option');
                        streamOption.value = streamIndex;
                        streamOption.textContent = subtitleLabel(option);
                        if (isTextBased === false) {
                            streamOption.disabled = true;
                        } else {
                            supportedCount += 1;
                        }
                        subtitleSelect.appendChild(streamOption);
                    });

                    subtitleSelect.disabled = false;
                    subtitleStatusRegion.textContent = 'Loaded ' + subtitles.length + ' subtitle stream(s), ' + supportedCount + ' compatible with GIF burn-in.';
                }

                function loadSubtitleOptions() {
                    var itemId = document.querySelector('#itemId').value.trim();
                    if (!itemId) {
                        resetSubtitleSelect('Enter an item id to load subtitle streams.');
                        return Promise.resolve();
                    }

                    resetSubtitleSelect('Loading subtitle streams...');

                    return fetch(getBaseUrl() + '/Plugins/GifGenerator/Subtitles/' + encodeURIComponent(itemId), {
                        method: 'GET',
                        headers: {
                            'X-Emby-Token': getAccessToken()
                        },
                        credentials: 'same-origin'
                    }).then(function (response) {
                        if (!response.ok) {
                            return response.text().then(function (text) {
                                throw new Error(text || ('Request failed with status ' + response.status));
                            });
                        }
                        return response.json();
                    }).then(function (data) {
                        var subtitles = data.subtitles || data.Subtitles || [];
                        if (!subtitles.length) {
                            resetSubtitleSelect('No subtitle streams found for this item.');
                            return;
                        }
                        populateSubtitleOptions(subtitles);
                    }).catch(function (error) {
                        resetSubtitleSelect('Failed to load subtitles: ' + error.message);
                    });
                }

                function renderDownload(downloadUrl) {
                    var absoluteUrl = downloadUrl.indexOf('http') === 0 ? downloadUrl : getBaseUrl() + '/' + downloadUrl.replace(/^\/+/, '');
                    downloadRegion.innerHTML = '';

                    var anchor = document.createElement('a');
                    anchor.href = absoluteUrl;
                    anchor.textContent = 'Download GIF';
                    anchor.target = '_blank';
                    anchor.rel = 'noopener';
                    downloadRegion.appendChild(anchor);

                    var preview = document.createElement('img');
                    preview.src = absoluteUrl + (absoluteUrl.indexOf('?') === -1 ? '?' : '&') + '_=' + Date.now();
                    preview.alt = 'Generated GIF preview';
                    downloadRegion.classList.add('gifResult');
                    downloadRegion.appendChild(preview);
                }

                document.querySelector('#LoadSubtitlesBtn').addEventListener('click', function () {
                    loadSubtitleOptions();
                });

                document.querySelector('#itemId').addEventListener('change', function () {
                    loadSubtitleOptions();
                });

                form.addEventListener('submit', function (event) {
                    event.preventDefault();
                    clearDownload();
                    setStatus('Creating GIF...', false);

                    var token = getAccessToken();
                    var userId = getCurrentUserId();
                    if (!token || !userId) {
                        renderUnauthorized('You are not signed in. Please sign in and try again.');
                        return;
                    }

                    var startSeconds;
                    try {
                        startSeconds = parseTimecodeToSeconds('#StartTimecode');
                    } catch (error) {
                        setStatus('Failed to create GIF: ' + error.message, true);
                        return;
                    }

                    var payload = {
                        itemId: document.querySelector('#itemId').value.trim(),
                        startSeconds: startSeconds,
                        lengthSeconds: Number(document.querySelector('#lengthSeconds').value)
                    };

                    var widthValue = parsePositiveInt('#width');
                    var fpsValue = parsePositiveInt('#fps');
                    if (widthValue > 0) {
                        payload.width = widthValue;
                    }
                    if (fpsValue > 0) {
                        payload.fps = fpsValue;
                    }

                    var selectedSubtitle = document.querySelector('#SubtitleStreamIndex').value;
                    if (selectedSubtitle !== '') {
                        payload.subtitleStreamIndex = parseInt(selectedSubtitle, 10);
                    }

                    var subtitleFontSize = parsePositiveInt('#SubtitleFontSize');
                    if (subtitleFontSize > 0) {
                        payload.subtitleFontSize = subtitleFontSize;
                    }

                    var subtitleTimingOffset = document.querySelector('#SubtitleTimingOffset').value.trim();
                    if (subtitleTimingOffset) {
                        payload.subtitleTimingOffset = subtitleTimingOffset;
                    }

                    fetch(getBaseUrl() + '/Plugins/GifGenerator/Create', {
                        method: 'POST',
                        headers: {
                            'Content-Type': 'application/json',
                            'X-Emby-Token': token
                        },
                        body: JSON.stringify(payload),
                        credentials: 'same-origin'
                    }).then(function (response) {
                        if (response.status === 401 || response.status === 403) {
                            renderUnauthorized('Your session is no longer authorized. Please sign in again.');
                            return null;
                        }

                        if (!response.ok) {
                            return response.text().then(function (bodyText) {
                                throw new Error(bodyText || ('Request failed (' + response.status + ')'));
                            });
                        }

                        return response.json();
                    }).then(function (result) {
                        if (!result) {
                            return;
                        }

                        if (!result.downloadUrl) {
                            throw new Error('GIF created, but no download URL was returned.');
                        }

                        setStatus('GIF created successfully.', false);
                        renderDownload(result.downloadUrl);
                    }).catch(function (error) {
                        setStatus('Failed to create GIF: ' + (error && error.message ? error.message : String(error)), true);
                    });
                });

                tryPrefillItemIdFromHash();
                loadSubtitleOptions();
            })();
        </script>
    </div>
</body>
</html>
