<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <title>GIF Generator</title>
</head>
<body>
    <div id="GifGeneratorPage" data-role="page" class="page type-interior" data-require="emby-input,emby-button,emby-select">
        <div data-role="content">
            <div class="content-primary">
                <div id="GifAuthMessage" class="fieldDescription" style="display: none; margin-bottom: 1em; color: var(--theme-danger, #ff6666);"></div>
                <form id="GifGeneratorCreateForm">
                    <fieldset id="GifFormControls" disabled>
                    <h2>Create GIF</h2>
                    <div class="fieldDescription">Create a GIF from any video item by searching for its title and generation settings.</div>

                    <div class="inputContainer">
                        <label class="inputLabel inputLabelUnfocused" for="GifItemSearch">Item Search</label>
                        <input id="GifItemSearch" name="GifItemSearch" type="text" is="emby-input" placeholder="Search movies, episodes, videos..." autocomplete="off" />
                        <div id="GifItemSearchResults" class="fieldDescription" role="listbox" aria-label="Item search results" tabindex="0" style="margin-top: .5em; max-height: 16em; overflow-y: auto; border: 1px solid rgba(255,255,255,.2); border-radius: .2em; padding: .4em;"></div>
                        <div id="GifItemSelectedLabel" class="fieldDescription" style="margin-top: .5em;">Selected: none</div>
                    </div>

                    <div class="inputContainer">
                        <label class="inputLabel inputLabelUnfocused" for="GifItemId">Item ID (internal)</label>
                        <input id="GifItemId" name="GifItemId" type="text" is="emby-input" required readonly aria-readonly="true" />
                        <div class="fieldDescription">This value is filled automatically when you choose a result above.</div>
                    </div>

                    <div class="inputContainer">
                        <label class="inputLabel inputLabelUnfocused" for="GifStartTime">Start Time (mm:ss or hh:mm:ss)</label>
                        <input id="GifStartTime" name="GifStartTime" type="text" is="emby-input" value="00:00" required />
                    </div>

                    <div class="inputContainer">
                        <label class="inputLabel inputLabelUnfocused" for="GifLength">Length (seconds)</label>
                        <input id="GifLength" name="GifLength" type="number" min="0.1" step="0.1" value="3" is="emby-input" required />
                    </div>

                    <div class="inputContainer">
                        <label class="inputLabel inputLabelUnfocused" for="GifFps">FPS (0 = plugin default)</label>
                        <input id="GifFps" name="GifFps" type="number" min="0" step="1" value="0" is="emby-input" />
                    </div>

                    <div class="inputContainer">
                        <label class="inputLabel inputLabelUnfocused" for="GifWidth">Width (0 = plugin default)</label>
                        <input id="GifWidth" name="GifWidth" type="number" min="0" step="1" value="0" is="emby-input" />
                    </div>

                    <div class="inputContainer">
                        <label class="inputLabel inputLabelUnfocused" for="GifSubtitle">Subtitle Stream</label>
                        <select id="GifSubtitle" name="GifSubtitle" is="emby-select">
                            <option value="">No subtitles</option>
                        </select>
                    </div>

                    <div class="inputContainer">
                        <label class="inputLabel inputLabelUnfocused" for="GifSubtitleFontSize">Subtitle Font Size (optional)</label>
                        <input id="GifSubtitleFontSize" name="GifSubtitleFontSize" type="number" min="1" max="256" step="1" is="emby-input" />
                    </div>

                    <div class="inputContainer">
                        <label class="inputLabel inputLabelUnfocused" for="GifSubtitleTimingOffset">Subtitle Timing Offset (optional)</label>
                        <input id="GifSubtitleTimingOffset" name="GifSubtitleTimingOffset" type="text" is="emby-input" placeholder="+500ms, -1.2s, +00:01.250, -01:02:03.5" pattern="^[+-]?(?:(?:\d+(?:\.\d+)?(?:ms|s))|(?:(?:\d+:)?[0-5]?\d:[0-5]?\d(?:\.\d+)?))$" />
                    </div>

                    <div style="display: flex; gap: .75em; flex-wrap: wrap; margin-top: 1em;">
                        <button id="LoadSubtitlesButton" is="emby-button" type="button" class="raised emby-button">
                            <span>Load Subtitles</span>
                        </button>
                        <button is="emby-button" type="submit" class="raised button-submit emby-button">
                            <span>Create GIF</span>
                        </button>
                    </div>

                    <div id="GifStatus" class="fieldDescription" style="margin-top: 1em;"></div>
                    <div id="GifResult" style="margin-top: 1em;"></div>
                    </fieldset>
                </form>
            </div>
        </div>

        <script type="text/javascript">
            (function () {
                'use strict';

                // Canonical authenticated user route for generation UX.
                var gifPageRoute = '#!/gif-generator';
                var isAuthorized = false;
                var hasInitialized = false;
                var initPromise = null;
                var currentGifObjectUrl = null;
                var searchDebounceTimer = null;
                var activeSearchRequestId = 0;
                var latestSearchRequestId = 0;
                var currentSearchResults = [];
                var activeResultIndex = -1;

                function normalizeApiPath(path) {
                    return path.charAt(0) === '/' ? path.slice(1) : path;
                }

                function getAccessToken() {
                    if (!window.ApiClient) {
                        return '';
                    }

                    if (typeof window.ApiClient.accessToken === 'function') {
                        return window.ApiClient.accessToken() || '';
                    }

                    if (window.ApiClient._serverInfo && window.ApiClient._serverInfo.AccessToken) {
                        return window.ApiClient._serverInfo.AccessToken;
                    }

                    if (window.ApiClient.serverInfo && window.ApiClient.serverInfo.AccessToken) {
                        return window.ApiClient.serverInfo.AccessToken;
                    }

                    return '';
                }

                function getCurrentUserId() {
                    if (!window.ApiClient) {
                        return '';
                    }

                    if (typeof window.ApiClient.getCurrentUserId === 'function') {
                        return window.ApiClient.getCurrentUserId() || '';
                    }

                    if (typeof window.ApiClient.getCurrentUser === 'function') {
                        var currentUser = window.ApiClient.getCurrentUser();
                        if (currentUser && currentUser.Id) {
                            return currentUser.Id;
                        }
                    }

                    if (window.ApiClient._serverInfo && window.ApiClient._serverInfo.UserId) {
                        return window.ApiClient._serverInfo.UserId;
                    }

                    if (window.ApiClient.serverInfo && window.ApiClient.serverInfo.UserId) {
                        return window.ApiClient.serverInfo.UserId;
                    }

                    return '';
                }

                function isAuthenticated() {
                    // Authentication source contract: Jellyfin ApiClient token + current user context.
                    return Boolean(getAccessToken() && getCurrentUserId());
                }

                function getLoginRoute() {
                    return '#!/login.html?returnurl=' + encodeURIComponent(gifPageRoute);
                }

                function trimTrailingSlashes(value) {
                    return (value || '').replace(/\/+$/, '');
                }

                function getBaseUrlPrefix() {
                    var serverAddress = '';
                    var webPathIndex;

                    if (window.ApiClient) {
                        serverAddress = window.ApiClient._serverAddress
                            || window.ApiClient.serverAddress
                            || (window.ApiClient._serverInfo && window.ApiClient._serverInfo.Address)
                            || (window.ApiClient.serverInfo && window.ApiClient.serverInfo.Address)
                            || '';
                    }

                    if (serverAddress) {
                        return trimTrailingSlashes(serverAddress);
                    }

                    webPathIndex = window.location.pathname.indexOf('/web/');
                    if (webPathIndex !== -1) {
                        return trimTrailingSlashes(window.location.origin + window.location.pathname.slice(0, webPathIndex));
                    }

                    return trimTrailingSlashes(window.location.origin);
                }

                function getFullyQualifiedLoginRoute() {
                    return getBaseUrlPrefix() + '/web/index.html#!/login.html?returnurl=' + encodeURIComponent(gifPageRoute);
                }

                function setFormEnabled(isEnabled) {
                    var fieldset = document.querySelector('#GifFormControls');
                    fieldset.disabled = !isEnabled;
                    fieldset.setAttribute('aria-disabled', String(!isEnabled));
                }

                function setUnauthorizedState(message) {
                    var authMessage = document.querySelector('#GifAuthMessage');

                    isAuthorized = false;
                    setFormEnabled(false);
                    clearResult();
                    authMessage.style.display = 'block';
                    authMessage.textContent = message || 'You must be signed in to use the GIF Generator page.';
                    setStatus('Unauthorized.', true);
                }

                function clearAuthWarning() {
                    var authMessage = document.querySelector('#GifAuthMessage');
                    authMessage.style.display = 'none';
                    authMessage.textContent = '';
                }

                function sleep(ms) {
                    return new Promise(function (resolve) {
                        setTimeout(resolve, ms);
                    });
                }

                function ensureClientReadyAsync() {
                    var retryDelaysMs = [0, 200, 350, 500, 800];
                    var attempt = 0;

                    function hasTokenOrUserCapability() {
                        if (!window.ApiClient) {
                            return false;
                        }

                        return Boolean(
                            typeof window.ApiClient.accessToken === 'function'
                            || typeof window.ApiClient.getCurrentUserId === 'function'
                            || typeof window.ApiClient.getCurrentUser === 'function'
                            || (window.ApiClient._serverInfo && (window.ApiClient._serverInfo.AccessToken || window.ApiClient._serverInfo.UserId))
                            || (window.ApiClient.serverInfo && (window.ApiClient.serverInfo.AccessToken || window.ApiClient.serverInfo.UserId)));
                    }

                    function hasUsableClient() {
                        return Boolean(
                            window.ApiClient
                            && typeof window.ApiClient.getUrl === 'function'
                            && (
                                typeof window.ApiClient.getAuthorizationHeader === 'function'
                                || hasTokenOrUserCapability()
                            ));
                    }

                    function probe() {
                        if (hasUsableClient()) {
                            return Promise.resolve({ ready: true, authenticated: isAuthenticated() });
                        }

                        if (!window.ApiClient && attempt < retryDelaysMs.length - 1) {
                            attempt += 1;
                            return sleep(retryDelaysMs[attempt]).then(probe);
                        }

                        if (attempt < retryDelaysMs.length - 1) {
                            attempt += 1;
                            return sleep(retryDelaysMs[attempt]).then(probe);
                        }

                        return Promise.resolve({ ready: Boolean(window.ApiClient), authenticated: isAuthenticated() });
                    }

                    return probe();
                }

                function redirectToLoginWithFallback() {
                    var currentHref = window.location.href;

                    window.location.replace(getLoginRoute());

                    setTimeout(function () {
                        if (window.location.href === currentHref || window.location.pathname.indexOf('/web/configurationpage') !== -1) {
                            window.location.replace(getFullyQualifiedLoginRoute());
                        }
                    }, 250);
                }

                function checkSessionAsync(options) {
                    var retryDelaysMs = [0, 350, 700];
                    var maxAttempts = (options && options.singleAttempt) ? 1 : retryDelaysMs.length;
                    var attempt = 0;

                    function probe() {
                        return fetch(getApiUrl('/Users/Me'), {
                            method: 'GET',
                            headers: getAuthHeaders(),
                            credentials: 'same-origin'
                        }).then(function (response) {
                            if (response.ok) {
                                return { authorized: true };
                            }

                            if (response.status === 401 || response.status === 403) {
                                if (attempt < maxAttempts - 1) {
                                    attempt += 1;
                                    return sleep(retryDelaysMs[attempt]).then(probe);
                                }

                                return { authorized: false, unauthorized: true };
                            }

                            if (attempt < maxAttempts - 1) {
                                attempt += 1;
                                return sleep(retryDelaysMs[attempt]).then(probe);
                            }

                            return { authorized: false, unauthorized: false, status: response.status };
                        }).catch(function () {
                            if (attempt < maxAttempts - 1) {
                                attempt += 1;
                                return sleep(retryDelaysMs[attempt]).then(probe);
                            }

                            return { authorized: false, unauthorized: false, status: 0 };
                        });
                    }

                    return probe();
                }

                function getApiUrl(path) {
                    if (window.ApiClient && typeof window.ApiClient.getUrl === 'function') {
                        return window.ApiClient.getUrl(normalizeApiPath(path));
                    }

                    return path;
                }

                function getAuthHeaders(headers) {
                    var merged = Object.assign({}, headers || {});

                    if (window.ApiClient && typeof window.ApiClient.getAuthorizationHeader === 'function') {
                        var authorizationHeader = window.ApiClient.getAuthorizationHeader();
                        merged.Authorization = authorizationHeader;
                        merged['X-Emby-Authorization'] = authorizationHeader;
                    } else if (window.ApiClient && typeof window.ApiClient.accessToken === 'function') {
                        merged['X-Emby-Token'] = window.ApiClient.accessToken() || '';
                    }

                    return merged;
                }

                function parseErrorMessage(response) {
                    if (response.status === 401 || response.status === 403) {
                        return Promise.resolve('Session expired or unauthorized — please sign in again.');
                    }

                    return response.text().then(function (text) {
                        return text || ('Request failed (' + response.status + ')');
                    });
                }

                function apiRequest(path, options) {
                    var requestOptions = options || {};

                    return fetch(getApiUrl(path), {
                        method: requestOptions.method || 'GET',
                        headers: getAuthHeaders(requestOptions.headers),
                        body: requestOptions.body,
                        credentials: requestOptions.credentials
                    }).then(function (response) {
                        if (!response.ok) {
                            return parseErrorMessage(response).then(function (message) {
                                throw new Error(message);
                            });
                        }

                        return response;
                    });
                }

                function getPageQueryParams() {
                    var hash = window.location.hash || '';
                    var qIndex = hash.indexOf('?');
                    if (qIndex !== -1) {
                        return new URLSearchParams(hash.slice(qIndex + 1));
                    }

                    return new URLSearchParams(window.location.search || '');
                }

                function parseTimecode(rawValue) {
                    var raw = rawValue.trim();
                    var parts;
                    var seconds;
                    var minutes;
                    var hours;

                    if (!raw) {
                        throw new Error('Start time is required.');
                    }

                    parts = raw.split(':');
                    if (parts.length < 2 || parts.length > 3) {
                        throw new Error('Start time must use mm:ss or hh:mm:ss format.');
                    }

                    seconds = Number(parts[parts.length - 1]);
                    minutes = Number(parts[parts.length - 2]);
                    hours = Number(parts.length === 3 ? parts[0] : 0);

                    if (Number.isNaN(seconds) || Number.isNaN(minutes) || Number.isNaN(hours) || seconds >= 60 || minutes >= 60 || seconds < 0 || minutes < 0 || hours < 0) {
                        throw new Error('Invalid start time.');
                    }

                    return (hours * 3600) + (minutes * 60) + seconds;
                }

                function subtitleLabel(stream) {
                    var parts = [];

                    if (stream.language || stream.Language) {
                        parts.push(stream.language || stream.Language);
                    }

                    if (stream.displayTitle || stream.DisplayTitle) {
                        parts.push(stream.displayTitle || stream.DisplayTitle);
                    }

                    if ((stream.isDefault || stream.IsDefault) === true) {
                        parts.push('Default');
                    }

                    if ((stream.isForced || stream.IsForced) === true) {
                        parts.push('Forced');
                    }

                    return parts.length ? parts.join(' - ') : 'Subtitle stream ' + (stream.streamIndex || stream.StreamIndex);
                }

                function setStatus(text, isError) {
                    var node = document.querySelector('#GifStatus');
                    node.textContent = text;
                    node.style.color = isError ? 'var(--theme-danger, #ff6666)' : 'var(--theme-primary-color, #52b54b)';
                }

                function getItemDisplayContext(item) {
                    var parts = [];
                    var parentNumber = item.ParentIndexNumber ?? item.parentIndexNumber;
                    var childNumber = item.IndexNumber ?? item.indexNumber;
                    var seasonLabel;
                    var episodeLabel;

                    if (item.SeriesName || item.seriesName) {
                        parts.push(item.SeriesName || item.seriesName);
                    }

                    if (parentNumber !== undefined && parentNumber !== null) {
                        seasonLabel = 'S' + String(parentNumber).padStart(2, '0');
                    }

                    if (childNumber !== undefined && childNumber !== null) {
                        episodeLabel = 'E' + String(childNumber).padStart(2, '0');
                    }

                    if (seasonLabel || episodeLabel) {
                        parts.push((seasonLabel || 'S??') + (episodeLabel || ''));
                    }

                    return parts.join(' • ');
                }

                function getItemDisplayLabel(item) {
                    var title = item.Name || item.name || 'Untitled';
                    var year = item.ProductionYear || item.productionYear;
                    var context = getItemDisplayContext(item);
                    var parts = [title];

                    if (year) {
                        parts.push('(' + year + ')');
                    }

                    if (context) {
                        parts.push('— ' + context);
                    }

                    return parts.join(' ');
                }

                function setSelectedItem(item) {
                    var itemIdInput = document.querySelector('#GifItemId');
                    var selectedLabel = document.querySelector('#GifItemSelectedLabel');

                    itemIdInput.value = item && (item.Id || item.id) ? (item.Id || item.id) : '';
                    if (!item) {
                        selectedLabel.textContent = 'Selected: none';
                        return;
                    }

                    selectedLabel.textContent = 'Selected: ' + getItemDisplayLabel(item);
                }

                function setSearchResultsMessage(message, isError) {
                    var resultsNode = document.querySelector('#GifItemSearchResults');
                    resultsNode.innerHTML = '';
                    resultsNode.textContent = message;
                    resultsNode.style.color = isError ? 'var(--theme-danger, #ff6666)' : 'inherit';
                    resultsNode.setAttribute('aria-activedescendant', '');
                    currentSearchResults = [];
                    activeResultIndex = -1;
                }

                function applyActiveResult() {
                    var resultsNode = document.querySelector('#GifItemSearchResults');
                    var nodes = resultsNode.querySelectorAll('[data-result-index]');

                    nodes.forEach(function (node) {
                        var index = Number(node.getAttribute('data-result-index'));
                        var isActive = index === activeResultIndex;
                        node.style.background = isActive ? 'rgba(255,255,255,.14)' : 'transparent';
                        node.setAttribute('aria-selected', String(isActive));
                        if (isActive) {
                            resultsNode.setAttribute('aria-activedescendant', node.id);
                        }
                    });

                    if (activeResultIndex < 0) {
                        resultsNode.setAttribute('aria-activedescendant', '');
                    }
                }

                function chooseSearchResult(index) {
                    var searchInput = document.querySelector('#GifItemSearch');
                    if (index < 0 || index >= currentSearchResults.length) {
                        return;
                    }

                    setSelectedItem(currentSearchResults[index]);
                    searchInput.value = getItemDisplayLabel(currentSearchResults[index]);
                    setSearchResultsMessage('Item selected. Search again to choose a different one.', false);
                }

                function renderSearchResults(items) {
                    var resultsNode = document.querySelector('#GifItemSearchResults');

                    if (!items.length) {
                        setSearchResultsMessage('No matching video items found.', false);
                        return;
                    }

                    resultsNode.innerHTML = '';
                    resultsNode.style.color = 'inherit';
                    currentSearchResults = items;
                    activeResultIndex = 0;

                    items.forEach(function (item, index) {
                        var row = document.createElement('button');

                        row.type = 'button';
                        row.id = 'GifItemSearchResult_' + index;
                        row.setAttribute('data-result-index', String(index));
                        row.setAttribute('role', 'option');
                        row.setAttribute('aria-selected', 'false');
                        row.style.display = 'block';
                        row.style.width = '100%';
                        row.style.textAlign = 'left';
                        row.style.background = 'transparent';
                        row.style.border = 'none';
                        row.style.color = 'inherit';
                        row.style.padding = '.35em .2em';
                        row.style.cursor = 'pointer';
                        row.textContent = getItemDisplayLabel(item);

                        row.addEventListener('click', function () {
                            chooseSearchResult(index);
                        });

                        resultsNode.appendChild(row);
                    });

                    applyActiveResult();
                }

                function fetchItemById(itemId) {
                    var userId = getCurrentUserId();
                    if (!userId || !itemId) {
                        return Promise.resolve(null);
                    }

                    return apiRequest('/Users/' + encodeURIComponent(userId) + '/Items/' + encodeURIComponent(itemId), {
                        method: 'GET'
                    }).then(function (response) {
                        return response.json();
                    }).catch(function () {
                        return null;
                    });
                }

                function searchGifItems(query) {
                    var userId = getCurrentUserId();
                    var requestId;

                    if (!userId) {
                        setSearchResultsMessage('Could not determine the current Jellyfin user for search.', true);
                        return Promise.resolve();
                    }

                    if (!query) {
                        setSearchResultsMessage('Type at least 2 characters to search video items.', false);
                        return Promise.resolve();
                    }

                    requestId = ++activeSearchRequestId;
                    latestSearchRequestId = requestId;
                    setSearchResultsMessage('Loading search results…', false);

                    return apiRequest('/Users/' + encodeURIComponent(userId) + '/Items?Recursive=true&SearchTerm=' + encodeURIComponent(query) + '&IncludeItemTypes=Movie,Episode,Video,MusicVideo,Trailer&Fields=ProductionYear,SeriesName,ParentIndexNumber,IndexNumber,MediaType&Limit=20&SortBy=SortName', {
                        method: 'GET'
                    }).then(function (response) {
                        return response.json();
                    }).then(function (payload) {
                        var items = payload.Items || payload.items || [];
                        var videoItems;

                        if (requestId !== latestSearchRequestId) {
                            return;
                        }

                        videoItems = items.filter(function (item) {
                            var mediaType = (item.MediaType || item.mediaType || '').toLowerCase();
                            var type = (item.Type || item.type || '').toLowerCase();
                            return mediaType === 'video'
                                || type === 'movie'
                                || type === 'episode'
                                || type === 'video'
                                || type === 'musicvideo'
                                || type === 'trailer';
                        });

                        renderSearchResults(videoItems);
                    }).catch(function (error) {
                        if (requestId !== latestSearchRequestId) {
                            return;
                        }

                        setSearchResultsMessage('Search failed: ' + error.message, true);
                    });
                }

                function onGifItemSearchInput(event) {
                    var query = event.target.value.trim();

                    clearTimeout(searchDebounceTimer);
                    searchDebounceTimer = setTimeout(function () {
                        searchGifItems(query.length >= 2 ? query : '');
                    }, 300);
                }

                function onGifItemSearchKeydown(event) {
                    if (!currentSearchResults.length) {
                        return;
                    }

                    if (event.key === 'ArrowDown') {
                        event.preventDefault();
                        activeResultIndex = Math.min(activeResultIndex + 1, currentSearchResults.length - 1);
                        applyActiveResult();
                    } else if (event.key === 'ArrowUp') {
                        event.preventDefault();
                        activeResultIndex = Math.max(activeResultIndex - 1, 0);
                        applyActiveResult();
                    } else if (event.key === 'Enter') {
                        event.preventDefault();
                        if (activeResultIndex >= 0) {
                            chooseSearchResult(activeResultIndex);
                        }
                    }
                }

                function revokeCurrentGifObjectUrl() {
                    if (!currentGifObjectUrl) {
                        return;
                    }

                    URL.revokeObjectURL(currentGifObjectUrl);
                    currentGifObjectUrl = null;
                }

                function clearResult() {
                    var result = document.querySelector('#GifResult');

                    revokeCurrentGifObjectUrl();
                    result.innerHTML = '';
                }

                function fetchGifBlob(fileName) {
                    return apiRequest('/Plugins/GifGenerator/Download/' + encodeURIComponent(fileName), {
                        method: 'GET'
                    }).then(function (response) {
                        return response.blob();
                    });
                }

                function setResult(fileName) {
                    var anchor = document.createElement('a');
                    var image = document.createElement('img');
                    var result = document.querySelector('#GifResult');

                    return fetchGifBlob(fileName).then(function (blob) {
                        var objectUrl = URL.createObjectURL(blob);

                        clearResult();
                        currentGifObjectUrl = objectUrl;

                        anchor.href = objectUrl;
                        anchor.download = fileName;
                        anchor.textContent = 'Download ' + fileName;

                        image.alt = 'Generated GIF preview';
                        image.src = objectUrl;
                        image.style.display = 'block';
                        image.style.marginTop = '.5em';
                        image.style.maxWidth = '100%';

                        result.appendChild(anchor);
                        result.appendChild(image);
                    });
                }

                function populateSubtitleSelect(subtitles) {
                    var select = document.querySelector('#GifSubtitle');

                    select.innerHTML = '<option value="">No subtitles</option>';

                    subtitles.forEach(function (stream) {
                        var option = document.createElement('option');
                        var index = stream.streamIndex ?? stream.StreamIndex;
                        var textBased = stream.isTextBased ?? stream.IsTextBased;

                        option.value = index;
                        option.textContent = subtitleLabel(stream);

                        if (textBased === false) {
                            option.disabled = true;
                        }

                        select.appendChild(option);
                    });
                }

                function fetchSubtitles(itemId) {
                    return apiRequest('/Plugins/GifGenerator/Subtitles/' + encodeURIComponent(itemId), {
                        method: 'GET'
                    }).then(function (response) {
                        return response.json();
                    }).then(function (payload) {
                        return payload.subtitles || payload.Subtitles || [];
                    });
                }

                function loadSubtitles() {
                    if (!isAuthorized) {
                        setUnauthorizedState('You must be signed in to load subtitles.');
                        return;
                    }

                    var itemId = document.querySelector('#GifItemId').value.trim();

                    if (!itemId) {
                        setStatus('Enter an item id before loading subtitles.', true);
                        return;
                    }

                    setStatus('Loading subtitles...', false);
                    populateSubtitleSelect([]);

                    fetchSubtitles(itemId).then(function (subtitles) {
                        populateSubtitleSelect(subtitles);
                        setStatus('Subtitles loaded.', false);
                    }).catch(function (error) {
                        setStatus('Could not load subtitles: ' + error.message, true);
                    });
                }

                function submitCreate(event) {
                    if (!isAuthorized) {
                        event.preventDefault();
                        setUnauthorizedState('You must be signed in to generate GIFs.');
                        return false;
                    }

                    var itemId;
                    var startSeconds;
                    var payload;
                    var subtitleValue;
                    var subtitleFontSizeValue;
                    var subtitleFontSize;
                    var subtitleTimingOffset;

                    event.preventDefault();

                    itemId = document.querySelector('#GifItemId').value.trim();
                    if (!itemId) {
                        setStatus('Item id is required.', true);
                        return false;
                    }

                    try {
                        startSeconds = parseTimecode(document.querySelector('#GifStartTime').value);
                    } catch (error) {
                        setStatus(error.message, true);
                        return false;
                    }

                    payload = {
                        itemId: itemId,
                        startSeconds: startSeconds,
                        lengthSeconds: Number(document.querySelector('#GifLength').value),
                        fps: Number(document.querySelector('#GifFps').value) || 0,
                        width: Number(document.querySelector('#GifWidth').value) || 0
                    };

                    subtitleValue = document.querySelector('#GifSubtitle').value;
                    if (subtitleValue !== '') {
                        payload.subtitleStreamIndex = Number(subtitleValue);
                    }

                    subtitleFontSizeValue = document.querySelector('#GifSubtitleFontSize').value.trim();
                    if (subtitleFontSizeValue !== '') {
                        subtitleFontSize = Number(subtitleFontSizeValue);
                        if (!Number.isInteger(subtitleFontSize) || subtitleFontSize < 1 || subtitleFontSize > 256) {
                            setStatus('Subtitle font size must be a whole number between 1 and 256.', true);
                            return false;
                        }

                        payload.subtitleFontSize = subtitleFontSize;
                    }

                    subtitleTimingOffset = document.querySelector('#GifSubtitleTimingOffset').value.trim();
                    if (subtitleTimingOffset !== '') {
                        payload.subtitleTimingOffset = subtitleTimingOffset;
                    }

                    clearResult();
                    setStatus('Generating GIF...', false);

                    apiRequest('/Plugins/GifGenerator/Create', {
                        method: 'POST',
                        headers: {
                            'Content-Type': 'application/json'
                        },
                        body: JSON.stringify(payload)
                    }).then(function (response) {
                        return response.json();
                    }).then(function (data) {
                        var fileName = data.fileName || data.FileName;

                        if (!fileName) {
                            throw new Error('Create endpoint did not return a file name.');
                        }

                        return setResult(fileName);
                    }).then(function () {
                        setStatus('GIF generated.', false);
                    }).catch(function (error) {
                        setStatus('Failed: ' + error.message, true);
                    });

                    return false;
                }

                async function onPageShow() {
                    var params;
                    var itemId;
                    var clientState;
                    var sessionState;

                    if (hasInitialized) {
                        return;
                    }

                    if (initPromise) {
                        return initPromise;
                    }

                    initPromise = (async function () {
                        setStatus('Checking session...', false);
                        setFormEnabled(false);
                        clearAuthWarning();

                        clientState = await ensureClientReadyAsync();

                        if (!clientState.ready) {
                            setStatus('Jellyfin client is still loading. Verifying session...', false);
                            sessionState = await checkSessionAsync({ singleAttempt: true });

                            if (!sessionState.authorized) {
                                if (sessionState.unauthorized) {
                                    setUnauthorizedState('You are not signed in. Redirecting to the Jellyfin login page...');
                                    redirectToLoginWithFallback();
                                    return;
                                }

                                setStatus('Jellyfin client is still loading. Please open this page again in a moment.', false);
                                return;
                            }
                        } else {
                            sessionState = await checkSessionAsync();
                        }

                        if (!sessionState.authorized) {
                            if (sessionState.unauthorized) {
                                setUnauthorizedState('You are not signed in. Redirecting to the Jellyfin login page...');
                                redirectToLoginWithFallback();
                                return;
                            }

                            setFormEnabled(false);
                            setStatus('Could not verify session. Please try again.', true);
                            return;
                        }

                        isAuthorized = true;
                        hasInitialized = true;
                        setFormEnabled(true);
                        clearAuthWarning();

                        params = getPageQueryParams();
                        itemId = (params.get('itemId') || params.get('id') || '').trim();

                        setStatus('Ready.', false);
                        document.querySelector('#GifResult').innerHTML = '';
                        populateSubtitleSelect([]);

                        if (itemId) {
                            setSelectedItem({ Id: itemId, Name: itemId });
                            fetchItemById(itemId).then(function (item) {
                                if (item && (item.Id || item.id) === itemId) {
                                    setSelectedItem(item);
                                }
                            });
                        } else {
                            setSelectedItem(null);
                        }

                        setSearchResultsMessage('Type at least 2 characters to search video items.', false);
                    })();

                    try {
                        await initPromise;
                    } finally {
                        if (!hasInitialized) {
                            initPromise = null;
                        }
                    }
                }

                var pageElement = document.querySelector('#GifGeneratorPage');
                pageElement.addEventListener('pageshow', onPageShow);
                pageElement.addEventListener('viewshow', onPageShow);

                setFormEnabled(false);
                setStatus('Waiting for Jellyfin client...', false);

                document.querySelector('#LoadSubtitlesButton').addEventListener('click', loadSubtitles);
                document.querySelector('#GifGeneratorCreateForm').addEventListener('submit', submitCreate);
                document.querySelector('#GifItemSearch').addEventListener('input', onGifItemSearchInput);
                document.querySelector('#GifItemSearch').addEventListener('keydown', onGifItemSearchKeydown);
                document.querySelector('#GifItemSearchResults').addEventListener('keydown', onGifItemSearchKeydown);
                onPageShow();
            })();
        </script>
    </div>
</body>
</html>
